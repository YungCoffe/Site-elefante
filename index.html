<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elefante Letrado — Userscript</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Partículas de fundo */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(99, 102, 241, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
        }

        /* Círculos decorativos */
        .glow-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
        }

        .glow-1 {
            width: 400px;
            height: 400px;
            background: #6366f1;
            top: -100px;
            left: -100px;
        }

        .glow-2 {
            width: 300px;
            height: 300px;
            background: #a855f7;
            bottom: -50px;
            right: -50px;
        }

        .glow-3 {
            width: 250px;
            height: 250px;
            background: #3b82f6;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.08;
        }

        /* Container principal */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        /* Ícone do elefante */
        .elephant-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            display: inline-block;
            animation: gentleBounce 3s ease-in-out infinite;
        }

        @keyframes gentleBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Título */
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: #f8fafc;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        h1 span {
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 3rem;
            font-weight: 300;
        }

        /* Botão principal */
        .main-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1.25rem 3rem;
            font-size: 1.2rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            color: #fff;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a855f7 100%);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 30px rgba(99, 102, 241, 0.4), 0 0 0 0 rgba(139, 92, 246, 0.7);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .main-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .main-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(99, 102, 241, 0.5), 0 0 0 4px rgba(139, 92, 246, 0.2);
        }

        .main-btn:hover::before {
            left: 100%;
        }

        .main-btn:active {
            transform: translateY(0);
        }

        .main-btn .btn-icon {
            font-size: 1.4rem;
        }

        /* Animação de pulso no botão */
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(139, 92, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0); }
        }

        .main-btn.pulsing {
            animation: pulse-ring 2s infinite;
        }

        /* Toast de notificação */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #e2e8f0;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            z-index: 1000;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-icon {
            color: #34d399;
            font-size: 1.2rem;
        }

        /* Preview do userscript */
        .code-preview {
            margin-top: 3rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: left;
            max-width: 500px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .code-preview.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .code-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            color: #94a3b8;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .code-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot-red { background: #ef4444; }
        .dot-yellow { background: #eab308; }
        .dot-green { background: #22c55e; }

        pre {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
            color: #cbd5e1;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .code-keyword { color: #c084fc; }
        .code-string { color: #86efac; }
        .code-comment { color: #64748b; }
        .code-tag { color: #60a5fa; }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            color: #475569;
            font-size: 0.8rem;
            z-index: 1;
        }

        /* Responsivo */
        @media (max-width: 640px) {
            h1 { font-size: 1.8rem; }
            .main-btn { padding: 1rem 2rem; font-size: 1rem; }
            .elephant-icon { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <!-- Partículas de fundo -->
    <div class="particles" id="particles"></div>

    <!-- Círculos de glow -->
    <div class="glow-circle glow-1"></div>
    <div class="glow-circle glow-2"></div>
    <div class="glow-circle glow-3"></div>

    <div class="container">
        <div class="elephant-icon">🐘</div>
        <h1>Elefante <span>Letrado</span></h1>
        <p class="subtitle">Copie o userscript com um clique</p>

        <button class="main-btn pulsing" id="copyBtn" onclick="copyUserscript()">
            <span class="btn-icon">📋</span>
            <span>Elefante Letrado</span>
        </button>

        <!-- Preview do código (aparece após copiar) -->
        <div class="code-preview" id="codePreview">
            <div class="code-header">
                <span class="code-dot dot-red"></span>
                <span class="code-dot dot-yellow"></span>
                <span class="code-dot dot-green"></span>
                <span style="margin-left: 0.5rem;">elefante.user.js</span>
            </div>
            <pre id="codeContent"></pre>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="toast-icon">✅</span>
        <span>Userscript copiado para a área de transferência!</span>
    </div>

    <div class="footer">by yungcoffe</div>

    <script>
        // Gerar partículas aleatórias
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 15 + 's';
            p.style.animationDuration = (10 + Math.random() * 10) + 's';
            particlesContainer.appendChild(p);
        }

        const userscript = `// ==UserScript==
// @name         Elefante Letrado
// @namespace    http://tampermonkey.net/
// @version      1.0
// @description  link do zap e bom
// @author       yungcoffe
// @match        https://reader.elefanteletrado.com.br/*
// @grant        none
// ==/UserScript==

(function() {
    'use strict';
    var s = document.createElement('script');
    s.src = 'https://raw.githubusercontent.com/YungCoffe/elefante.-auto/refs/heads/main/elefante.user.js';
    document.body.appendChild(s);
})();`;

        function copyUserscript() {
            navigator.clipboard.writeText(userscript).then(() => {
                // Mostrar toast
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);

                // Mostrar preview do código com highlight
                const preview = document.getElementById('codePreview');
                const content = document.getElementById('codeContent');
                
                // Syntax highlighting simples
                let highlighted = userscript
                    .replace(/\/\/ .*/g, '<span class="code-comment">$&</span>')
                    .replace(/(@\w+)/g, '<span class="code-keyword">$1</span>')
                    .replace(/'(.*?)'/g, '<span class="code-string">\'$1\'</span>')
                    .replace(/https?:\/\/[^\s]+/g, '<span class="code-string">$&</span>')
                    .replace(/\/\/ ==UserScript==|\/\/ ==\/UserScript==/g, '<span class="code-tag">$&</span>');
                
                content.innerHTML = highlighted;
                preview.classList.add('visible');

                // Remover pulso do botão
                document.getElementById('copyBtn').classList.remove('pulsing');
            }).catch(err => {
                alert('Erro ao copiar: ' + err);
            });
        }
    </script>
</body>
</html>
